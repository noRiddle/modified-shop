{if $options!=''}
{foreach name=outer item=options_data from=$options} 
<div class="row">
  <div class="selecttitle">{$options_data.NAME}:</div>
  <div class="selectentry">
    {foreach key=key_data name=key_data item=item_data from=$options_data.DATA}
    <input type="radio" name="id[{$options_data.ID}]" id="{$item_data.ID}" value="{$item_data.ID}" {if $smarty.foreach.key_data.first}checked="checked" {/if} />
    <label for="{$item_data.ID}">{$item_data.TEXT} {if $item_data.PRICE!=''}( {$item_data.PREFIX}{$item_data.PRICE} ){/if}</label>
    <br /> 
  {/foreach}
  </div>
  <br class="clearfix" />
</div>
{/foreach} 
{/if}
