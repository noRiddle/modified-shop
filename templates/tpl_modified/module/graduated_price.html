{config_load file="$language/lang_$language.conf" section="graduated_price"} 
<strong>{#heading_text#}:</strong>
<table cellpadding="0" cellspacing="1" border="0" class="graduatedprice" width="100%">
{foreach name=aussen item=module_data from=$module_content} 
  <tr> 
    <td>{$module_data.QUANTITY} {#unit#}</td>
    <td>{#pieces#} {$module_data.PRICE}</td>
    {if $module_data.VPE}<td>{$module_data.VPE}</td>{/if}
  </tr>
{/foreach}
</table>
